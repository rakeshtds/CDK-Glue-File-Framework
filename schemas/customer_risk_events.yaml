database: finance_raw
tableName: customer_risk_events
description: >
  Real-time customer risk and compliance events emitted as JSON by the
  risk scoring engine. Each record represents a scored event such as a
  login anomaly, large transfer, KYC state change, or AML alert.
  Partitioned by year/month/day/hour to match existing S3 layout.

format: JSON

columns:
  - name: event_id
    type: string
    comment: "UUID v4 — unique identifier for this risk event"

  - name: event_type
    type: string
    comment: "LOGIN_ANOMALY | LARGE_TRANSFER | KYC_CHANGE | AML_ALERT | SANCTION_HIT | DEVICE_CHANGE"

  - name: customer_id
    type: string
    comment: "Internal customer identifier (FK to customer master)"

  - name: account_number
    type: string
    comment: "Affected account number (masked)"

  - name: event_ts
    type: timestamp
    comment: "UTC timestamp when the event was generated by the risk engine"

  - name: risk_score
    type: double
    comment: "Composite risk score 0.0 (no risk) to 1.0 (highest risk)"

  - name: risk_band
    type: string
    comment: "LOW | MEDIUM | HIGH | CRITICAL — derived from risk_score thresholds"

  - name: triggered_rules
    type: "array<string>"
    comment: "List of rule IDs that fired for this event e.g. [R001, R045]"

  - name: geo_country
    type: string
    comment: "ISO 3166-1 alpha-2 country code where the event originated"

  - name: geo_city
    type: string
    comment: "City of origin (best-effort, may be null)"

  - name: ip_address
    type: string
    comment: "Hashed originating IP address"

  - name: device_fingerprint
    type: string
    comment: "Hashed device fingerprint, null for non-digital channels"

  - name: action_taken
    type: string
    comment: "NONE | ALERT_RAISED | ACCOUNT_FROZEN | CASE_CREATED | TRANSACTION_BLOCKED"

  - name: case_id
    type: string
    comment: "Compliance case ID if action_taken = CASE_CREATED, else null"

  - name: reviewed_by
    type: string
    comment: "Analyst ID if manually reviewed, null if auto-resolved"

  - name: resolution_ts
    type: timestamp
    comment: "UTC timestamp when the event was resolved, null if still open"

  - name: raw_payload
    type: string
    comment: "Full original JSON payload from the risk engine (for audit trail)"

partitions:
  columns:
    - name: year
      type: string
      comment: "Partition year  e.g. 2024"
    - name: month
      type: string
      comment: "Partition month e.g. 01"
    - name: day
      type: string
      comment: "Partition day   e.g. 15"
    - name: hour
      type: string
      comment: "Partition hour  e.g. 09 (24h UTC)"
  s3Pattern: "year={year}/month={month}/day={day}/hour={hour}"

s3Location:
  bucketName: my-finance-data-lake
  prefix: raw/customer_risk_events/

# JSON SerDe — tolerates malformed records (important for event streams)
serdeOverride:
  serializationLibrary: org.openx.data.jsonserde.JsonSerDe
  parameters:
    ignore.malformed.json: "TRUE"
    dots.in.keys:          "FALSE"
    case.insensitive:      "TRUE"

refresh:
  strategy: event   # new files on S3 instantly trigger MSCK REPAIR via Lambda

tags:
  Team:               data-engineering
  Domain:             finance
  DataClassification: restricted        # AML/KYC data — highest sensitivity
  CostCenter:         data-platform
  ComplianceScope:    "AML, KYC, GDPR"
